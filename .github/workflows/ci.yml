name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: peterjurco_test
        ports:
          - 5544:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Serves the Neon serverless HTTP protocol in front of the plain
      # Postgres service so the production neon-http driver works in the
      # dev-server health test (see src/db/client.ts).
      neon-http-proxy:
        image: ghcr.io/timowilhelm/local-neon-http-proxy:main
        env:
          PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/peterjurco_test
        ports:
          - 4444:4444

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5544/peterjurco_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome ci)
        run: pnpm lint

      - name: Type check (astro check)
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
